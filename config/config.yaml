snowflake:
  account: "${SNOWFLAKE_ACCOUNT}"
  user: "${SNOWFLAKE_USER}"
  password: "${SNOWFLAKE_PASSWORD}"
  warehouse: "COMPUTE_WH"
  database: "PROD_DB"
  schema: "PUBLIC"
  role: "SRE_MONITOR_ROLE"

aws:
  region: "us-east-1"
  s3_bucket: "${S3_BUCKET}"
  sns_topic_arn: "${SNS_TOPIC_ARN}"
  cloudwatch_namespace: "LakehouseSRE"

iceberg:
  catalog_name: "lakehouse_catalog"
  warehouse_path: "s3://${S3_BUCKET}/iceberg-warehouse"
  tables:
    - namespace: "raw"
      name: "pipeline_metrics"
    - namespace: "curated"
      name: "slo_burn_rate"

prometheus:
  port: 8000
  scrape_interval_seconds: 30

slo:
  pipeline_latency_p95_seconds: 300        # 5 min
  pipeline_latency_alert_seconds: 240      # alert at 4 min
  data_freshness_max_minutes: 30
  error_rate_threshold_pct: 1.0
  row_count_anomaly_pct: 20.0
  burn_rate_alert_multiplier: 14.4         # 1-hour window, 30-day SLO budget

monitoring:
  collection_interval_seconds: 60
  pipelines_to_monitor:
    - "RAW_INGEST_PIPELINE"
    - "CURATED_TRANSFORM_PIPELINE"
    - "BUSINESS_LAYER_PIPELINE"
    - "ANALYTICS_AGGREGATION_PIPELINE"

otel:
  service_name: "lakehouse-sre-platform"
  otlp_endpoint: "http://localhost:4317"
  trace_sample_rate: 1.0
