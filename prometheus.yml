global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 10s

  external_labels:
    environment: production
    project: lakehouse-sre

# Alerting rules file
rule_files:
  - "rules/slo_burn_rate.yml"

# Alertmanager (connect your own instance)
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:

  # ── Main SRE metrics exporter ───────────────────────────────────────────────
  - job_name: "lakehouse_sre"
    static_configs:
      - targets: ["pipeline-monitor:8000"]
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "lakehouse-sre-monitor"

  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Node exporter (host metrics) ────────────────────────────────────────────
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
